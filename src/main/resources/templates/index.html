<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>DAST Demo - Student Portal</title>
</head>
<body>
    <h1>Student Portal</h1>
    <p>Welcome to the RITEH Student Portal (DAST Demo).</p>

    <nav>
        <h2>Navigation</h2>
        <ul>
            <li><a href="/search">Search Students</a></li>
            <li><a href="/search?query=Ivan">Search for "Ivan"</a></li>
            <li><a href="/greet?name=Student">Greeting Page</a></li>
            <li><a href="/files">Download Files</a></li>
        </ul>
    </nav>

    <h2>Quick Search</h2>
    <form action="/search" method="get">
        <label for="query">Student name:</label>
        <input type="text" id="query" name="query" placeholder="Enter student name..."/>
        <button type="submit">Search</button>
    </form>

    <h2>Personalized Greeting</h2>
    <form action="/greet" method="get">
        <label for="name">Your name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name..."/>
        <button type="submit">Greet me</button>
    </form>
</body>
</html>
